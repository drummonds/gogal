# https://taskfile.dev

version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list
    silent: true

  fmt:
    desc: Format Go code
    cmds:
      - gofmt -w .

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  check:
    desc: Run fmt, vet, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist/
      - rm -f docs/*.html
      - find examples -name "*.wasm" -delete 2>/dev/null || true

  docs:build:
    desc: Build documentation (markdown to HTML)
    cmds:
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file ROADMAP.md --dst docs
      - task-plus md2html --file RESEARCH.md --dst docs
      - task-plus md2html --file docs/index.md --dst docs

  # Go example tasks (wildcard)
  example:*:
    desc: 'Run Go example by number'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No example found for number {{.NUM}}'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - go mod tidy
      - go run .

  # Go module tidy tasks
  tidy:
    desc: Run go tidy and update for all modules
    deps: [tidy:main]

  tidy:main:
    desc: Run go tidy and update main
    cmds:
      - go mod tidy
      - go get -u ./...

  tidy:*:
    desc: 'Run go tidy and update for example'
    vars:
      NUM: '{{index .MATCH 0}}'
      EXAMPLE_DIR:
        sh: ls -d examples/{{index .MATCH 0}}_*/go 2>/dev/null || echo ""
    preconditions:
      - sh: '[ -n "{{.EXAMPLE_DIR}}" ]'
        msg: 'No Go example found for number {{.NUM}}'
    dir: '{{.EXAMPLE_DIR}}'
    cmds:
      - go mod tidy
      - go get -u ./...
